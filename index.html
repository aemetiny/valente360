<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>

<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
}

#panorama{
width:100%;
height:100vh;
}

</style>

</head>

<body>

<div id="panorama"></div>

<script>

pannellum.viewer('panorama',{

type:"equirectangular",

panorama:"gorsel1.png",

autoLoad:true,

showControls:false,

mouseZoom:true,

compass:false,

orientationOnByDefault:true

});

</script>

</body>
</html>
